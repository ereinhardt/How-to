<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to?</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.1.5/hls.js" integrity="sha512-YR4vWgTmC0QwRfYKWTy1eTMvBYpmAsSGP76is/15Uxqfa3N/qYRZKFE8pf66GsfSrFksaJkNmbTS2BcdLamZoA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</head>
<style>

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  
  .main{
    position: absolute;
    margin: auto;
    z-index: 1000;
    max-width: 177.78vh;
    max-height: 100vh;
    width: 100vw;
    height: calc(100vw / 1.7778);
    overflow-x: hidden;
  }
  .Video{
    width: 100%;
    position: absolute;
    height: 100%;
    top: 0;
    z-index: -10000000000;
    overflow-x: hidden;
  }
  
  .Search{
    height: 30px;
    margin-left: -8px;
    width: 217px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  
  .Search input{
    width: 100px;
    height: 14px;
    overflow-x: hidden;
  }
  .Search span {
    cursor: pointer;
    overflow-x: hidden;
  }
  
  .Stamps {
    height: calc(50% - 31px);
    overflow-y: auto;
    width: 100%;
    margin-left: 8px;
    overflow-x: hidden;
  }
  #active {
    color: red;
  }

</style>

<body>
    <div class="main">
        <div class="Search">
          <span> How to&nbsp;</span>
          <input type="text"  name="" value="">
          <span id="search_span"><button id="search_button">?</button></span>
        </div>
        <div class="Stamps">
        </div>
        <div class="Video">
         <video src="" controls controlslist="noplaybackrate nodownload nofullscreen" autoplay style="display: none; width: 100%; height: auto;" style="height: 100%; width: 100%">
    
         </video>
        </div>
      </div>
<script>
    //TODO: check if you need a port!
    const socket = io();
    let currentTimestamps = 0;
    let timeStamps = [];

    let num_of_videos = 0;
    let search_value = "";
    
    let hls_context;

    let is_searching = false;

    document.getElementById("search_span").addEventListener("click", () => {
      start_search(); 
    });

    // Add Enter key support for the input field
    document.getElementsByTagName("input")[0].addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        start_search();
      }
    });

    function start_search(){


        deleteAllTimestamps();
        num_of_videos = 0;
        currentTimestamps = 0;
        let current_value = document.getElementsByTagName("input")[0].value;
        
        document.body.style.cursor = "wait";

        const video = document.getElementsByTagName("video")[0];
        video.style.display = "none";
        document.body.style.backgroundColor = "white";

        search_value = `How to ${current_value}`;

        document.getElementById("search_button").disabled = true;
        socket.disconnect();
        socket.connect();

        socket.emit("NEW_SEARCH", {search: search_value, is_first: true});
       
        destroy_hls_context();

        socket.on("START_STREAM", (source_url, user) => {

            console.log("start Hls Stream! with url: " + source_url);
            document.body.style.cursor = "auto";
            document.getElementById("search_button").disabled = false;
            start_hls(source_url);
            generatingTimestamps(user.questions);
            console.log(user.questions);
        });

        // Listen for Gemini API errors (all error codes)
        socket.on("GEMINI_API_ERROR", (error) => {
            console.log("Gemini API Error received:", error.message);
            resetToInitialState();
        });

        // Listen for general search errors
        socket.on("SEARCH_ERROR", (error) => {
            console.log("Search Error received:", error.message);
            resetToInitialState();
        });

        // Listen for stream end event from server
        socket.on("STREAM_ENDED", () => {
            console.log("Received STREAM_ENDED event from server");
            resetToInitialState();
        });

        
    }

    function destroy_hls_context() {
        if(hls_context) {
            hls_context.destroy();
            hls_context.detachMedia();
            
            hls_context = null;
        }
    }

    function start_hls(source_url) {
         

       
        const video = document.getElementsByTagName("video")[0];
        video.style.display = "block";
        if(!Hls.isSupported()){
            alert("L in chat für den User der kein HLS abspielen kann!");
        }

        hls_context = new Hls({
            levelLoadingTimeOut: 1000000,
            manifestLoadingTimeOut: 1000,
            levelLoadingMaxRetryTimeout: 1000,
            levelLoadingMaxRetry: 2,
            autoStartLoad : true, 
            debug: false,
            liveDurationInfinity: false,
            maxBufferLength: 20,
            liveSyncDurationCount: 5,
            backBufferLength: 20, 
            adjustTs: true,
            forceKeyFrameOnDiscontinuity: true, 
            makSeekHole: 1
        });

        hls_context.loadSource(source_url);
        hls_context.attachMedia(video);
        document.body.style.backgroundColor = "black";

        // Listen for stream end events
        hls_context.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log('Fatal network error, stream might have ended');
                        if (data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR || 
                            data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR) {
                            resetToInitialState();
                        }
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log('Fatal media error');
                        break;
                    default:
                        console.log('Fatal error');
                        break;
                }
            }
        });

        video.addEventListener("ended", () => {
          console.log("Stream has Ended! (#EXT-X-ENDLIST)");
          resetToInitialState();
        });

        // Additional listener for when stream reaches end
        hls_context.on(Hls.Events.LEVEL_UPDATED, function (event, data) {
            if (data.details && data.details.endOfStream) {
                console.log("Stream end detected via level update");
                resetToInitialState();
            }
        });
      }

      function deleteAllTimestamps() {
        document.querySelectorAll(".Stamps a").forEach(a => a.remove());
      }

      function resetToInitialState() {
        console.log("Resetting to initial state");
        destroy_hls_context();
        const video = document.getElementsByTagName("video")[0];
        video.style.display = "none";
        video.src = "";
        document.getElementsByTagName("input")[0].value = "";
        document.body.style.backgroundColor = "white";
        deleteAllTimestamps();
        
        // Remove any timeupdate handlers
        if (timeupdateHandler) {
          video.removeEventListener("timeupdate", timeupdateHandler);
          timeupdateHandler = null;
        }
        
        // Reset state variables
        currentTimestamps = 0;
        timeStamps = [];
        num_of_videos = 0;
        search_value = "";
        is_searching = false;
        
        // Enable search button
        document.getElementById("search_button").disabled = false;
        document.body.style.cursor = "auto";
      }


    let timeupdateHandler = null;
    let lastActiveQuestionIndex = -1; // Track which question was last active
    let shouldAutoScroll = true; // Flag to control auto-scrolling
    let userScrollTimer = null; // Timer to detect user scrolling

    function generatingTimestamps(questions) {
      const vid = document.getElementsByTagName("video")[0];
      let currentIndex = 1;

      // falls schon ein alter Handler existiert → entfernen
      if (timeupdateHandler) {
        vid.removeEventListener("timeupdate", timeupdateHandler);
      }

      // neuen Handler definieren
      timeupdateHandler = () => {
        const time = vid.currentTime;
        
        // Generate new timestamps as they reach their start time
        if (currentIndex < questions.length && time > questions[currentIndex].startTimeInSec) {
          generateTimeStamp(questions[currentIndex]);
          currentIndex++;
        }
        
        // Update active timestamp based on current video time
        updateActiveTimestamp(time, questions);
      };

      // neuen Handler anhängen
      vid.addEventListener("timeupdate", timeupdateHandler);
    }

    function updateActiveTimestamp(currentTime, questions) {
      // Find which timestamp should be active based on current time
      let activeQuestionIndex = 0;
      
      for (let i = questions.length - 1; i >= 0; i--) {
        if (currentTime >= questions[i].startTimeInSec) {
          activeQuestionIndex = i;
          break;
        }
      }
      
      // Check if active question changed (new timestamp or user skipped in video)
      const activeQuestionChanged = activeQuestionIndex !== lastActiveQuestionIndex;
      lastActiveQuestionIndex = activeQuestionIndex;
      
      // Find the corresponding DOM element and set it as active
      const allLinks = document.querySelectorAll(".Stamps a");
      allLinks.forEach(link => link.id = ""); // Remove active from all
      
      // Find and activate the correct timestamp
      const activeQuestion = questions[activeQuestionIndex];
      if (activeQuestion) {
        allLinks.forEach(link => {
          if (link.innerText === activeQuestion.question) {
            link.id = "active";
            // Auto-scroll when active question changes
            if (activeQuestionChanged) {
              // Check if active element is visible
              const stampsContainer = document.getElementsByClassName("Stamps")[0];
              const linkWrapper = link.parentElement;
              const containerHeight = stampsContainer.clientHeight;
              const linkHeight = linkWrapper.offsetHeight;
              const linkOffsetTop = linkWrapper.offsetTop;
              const currentScrollTop = stampsContainer.scrollTop;
              
              const visibleTop = currentScrollTop;
              const visibleBottom = currentScrollTop + containerHeight;
              const elementTop = linkOffsetTop;
              const elementBottom = linkOffsetTop + linkHeight;
              
              const isFullyVisible = elementTop >= visibleTop && elementBottom <= visibleBottom;
              
              // Scroll if: auto-scroll is enabled OR element is not visible (user likely skipped in video)
              if (shouldAutoScroll || !isFullyVisible) {
                scrollToActiveTimestamp(link);
              }
            }
          }
        });
      }
    }

      function generateTimeStamp(question) {
        generateTimeStampsDOM(question.question, question.startTimeInSec)
      }

      function generateTimeStampsDOM(title, time){
        var wrapper = document.createElement("div");
        wrapper.className = title;
        var link = document.createElement("a");
        link.href = "#";
        // Don't automatically set as active - let updateActiveTimestamp handle it
        link.innerText = title;
        
        link.onclick = (e)=>{
          Jumpto(time, e);
          setActiveLink(e.target);
        }
        wrapper.appendChild(link);
        document.getElementsByClassName("Stamps")[0].appendChild(wrapper);
        
        // Only scroll to newest when a new timestamp is generated
        // (not when user is manually scrolling)
        if (shouldAutoScroll) {
          scrollToNewestTimestamp();
        }
      }


      function Jumpto(value, e){
        e.preventDefault();
        return document.getElementsByTagName("video")[0].currentTime = value;
      }

      function setActiveLink(linkElem) {
        // alle bisherigen aktiven Links deaktivieren
        document.querySelectorAll(".Stamps a").forEach(a => a.id = "");
        // den geklickten aktiv setzen
        linkElem.id = "active";
        // When user clicks a timestamp, enable auto-scroll and scroll to it
        shouldAutoScroll = true;
        scrollToActiveTimestamp(linkElem);
      }

      // Add scroll event listener to detect user scrolling
      document.addEventListener("DOMContentLoaded", () => {
        const stampsContainer = document.getElementsByClassName("Stamps")[0];
        
        stampsContainer.addEventListener("scroll", () => {
          // User is manually scrolling - disable auto-scroll temporarily
          shouldAutoScroll = false;
          
          // Clear existing timer
          if (userScrollTimer) {
            clearTimeout(userScrollTimer);
          }
          
          // Re-enable auto-scroll after 3 seconds of no manual timestamp scrolling
          userScrollTimer = setTimeout(() => {
            shouldAutoScroll = true;
          }, 3000);
        });
        
        // Add window resize event listener to keep active timestamp visible
        window.addEventListener("resize", () => {
          // Find the currently active timestamp
          const activeLink = document.getElementById("active");
          if (activeLink && shouldAutoScroll) {
            // Small delay to ensure the DOM has updated after resize
            setTimeout(() => {
              scrollToActiveTimestamp(activeLink);
            }, 100);
          }
        });
      });

      // Automatisch zum neuesten (zuletzt hinzugefügten) Timestamp scrollen
      function scrollToNewestTimestamp() {
        const stampsContainer = document.getElementsByClassName("Stamps")[0];
        stampsContainer.scrollTop = stampsContainer.scrollHeight;
      }

            // Automatisch zum aktiven Timestamp scrollen (ohne smooth behavior)
      function scrollToActiveTimestamp(activeLink) {
        const stampsContainer = document.getElementsByClassName("Stamps")[0];
        const linkWrapper = activeLink.parentElement;
        
        const containerHeight = stampsContainer.clientHeight;
        const linkHeight = linkWrapper.offsetHeight;
        const linkOffsetTop = linkWrapper.offsetTop;
        const currentScrollTop = stampsContainer.scrollTop;
        
        // Calculate the visible area boundaries
        const visibleTop = currentScrollTop;
        const visibleBottom = currentScrollTop + containerHeight;
        
        // Calculate element boundaries
        const elementTop = linkOffsetTop;
        const elementBottom = linkOffsetTop + linkHeight;
        
        // Check if element is fully visible
        const isFullyVisible = elementTop >= visibleTop && elementBottom <= visibleBottom;
        
        if (!isFullyVisible) {
          // Element is not fully visible, calculate new scroll position
          let targetScrollTop;
          
          // If element is too close to top or partially above visible area
          if (elementTop < visibleTop || elementTop < visibleTop + (linkHeight * 0.5)) {
            // Scroll so element is at top with small margin
            targetScrollTop = Math.max(0, elementTop - 10);
          }
          // If element is too close to bottom or partially below visible area  
          else if (elementBottom > visibleBottom || elementBottom > visibleBottom - (linkHeight * 0.5)) {
            // Scroll so element is at bottom with small margin
            targetScrollTop = elementBottom - containerHeight + 10;
          }
          // Default: center the element
          else {
            targetScrollTop = linkOffsetTop - (containerHeight / 2) + (linkHeight / 2);
          }
          
          // Apply scroll position with bounds checking
          stampsContainer.scrollTop = Math.max(0, Math.min(targetScrollTop, stampsContainer.scrollHeight - containerHeight));
        }
        // If element is already fully visible, don't scroll
      }


</script>
</body>
</html>
