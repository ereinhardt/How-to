<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How To?</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.1.5/hls.js" integrity="sha512-YR4vWgTmC0QwRfYKWTy1eTMvBYpmAsSGP76is/15Uxqfa3N/qYRZKFE8pf66GsfSrFksaJkNmbTS2BcdLamZoA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</head>
<style>

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  
  .main{
    position: absolute;
    margin: auto;
    z-index: 1000;
    max-width: 177.78vh;
    max-height: 100vh;
    width: 100vw;
    height: calc(100vw / 1.7778);
    overflow-x: hidden;
  }
  .Video{
    width: 100%;
    position: absolute;
    height: 100%;
    top: 0;
    z-index: -10000000000;
    overflow-x: hidden;
  }
  
  .Search{
    height: 30px;
    margin-left: -8px;
    width: 217px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  
  .Search input{
    width: 100px;
    height: 14px;
    overflow-x: hidden;
  }
  .Search span {
    cursor: pointer;
    overflow-x: hidden;
  }
  
  .Stamps {
    height: calc(50% - 31px);
    overflow-y: auto;
    width: 100%;
    margin-left: 8px;
    overflow-x: hidden;
  }
  #active {
    color: red;
  }

</style>

<body>
    <div class="main">
        <div class="Search">
          <span> How to&nbsp;</span>
          <input type="text"  name="" value="">
          <span id="search_span"><button id="search_button">?</button></span>
        </div>
        <div class="Stamps">
        </div>
        <div class="Video">
         <video src="" controls controlslist="noplaybackrate nodownload nofullscreen" autoplay style="display: none; width: 100%; height: auto;" style="height: 100%; width: 100%">
    
         </video>
        </div>
      </div>
<script>
    //TODO: check if you need a port!
    const socket = io();
    let currentTimestamps = 0;
    let timeStamps = [];

    let num_of_videos = 0;
    let search_value = "";
    
    let hls_context;

    let is_searching = false;

    document.getElementById("search_span").addEventListener("click", () => {
      start_search(); 
    });

    // Add Enter key support for the input field
    document.getElementsByTagName("input")[0].addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        start_search();
      }
    });

    function start_search(){


        deleteAllTimestamps();
        num_of_videos = 0;
        currentTimestamps = 0;
        let current_value = document.getElementsByTagName("input")[0].value;
        
        document.body.style.cursor = "wait";

        const video = document.getElementsByTagName("video")[0];
        video.style.display = "none";
        document.body.style.backgroundColor = "white";

        search_value = `How to ${current_value}`;

        document.getElementById("search_button").disabled = true;
        socket.disconnect();
        socket.connect();

        socket.emit("NEW_SEARCH", {search: search_value, is_first: true});
       
        destroy_hls_context();

        socket.on("START_STREAM", (source_url, user) => {

            console.log("start Hls Stream! with url: " + source_url);
            document.body.style.cursor = "auto";
            document.getElementById("search_button").disabled = false;
            start_hls(source_url);
            generatingTimestamps(user.questions);
            console.log(user.questions);
        });

        // Listen for stream end event from server
        socket.on("STREAM_ENDED", () => {
            console.log("Received STREAM_ENDED event from server");
            resetToInitialState();
        });



        
    }

    function destroy_hls_context() {
        if(hls_context) {
            hls_context.destroy();
            hls_context.detachMedia();
            
            hls_context = null;
        }
    }

    function start_hls(source_url) {
         

       
        const video = document.getElementsByTagName("video")[0];
        video.style.display = "block";
        if(!Hls.isSupported()){
            alert("L in chat für den User der kein HLS abspielen kann!");
        }

        hls_context = new Hls({
            levelLoadingTimeOut: 10000,
            manifestLoadingTimeOut: 5000,
            levelLoadingMaxRetryTimeout: 2000,
            levelLoadingMaxRetry: 1,
            autoStartLoad : true, 
            debug: false, // Reduce debug logs
            liveDurationInfinity: true, // Allow seeking anywhere in the stream
            maxBufferLength: 30, // Balanced buffer for A/V sync
            backBufferLength: 15, // Sufficient back buffer for sync
            adjustTs: true, // Critical for A/V sync
            forceKeyFrameOnDiscontinuity: true, 
            makSeekHole: 0.1, // Allow small seeks over holes
            // Prevent excessive manifest reloads
            enableWorker: false,
            lowLatencyMode: false,
            // Audio-Video sync optimization
            audioCodec: undefined, // Let HLS.js auto-detect
            videoCodec: undefined, // Let HLS.js auto-detect
            // Significantly reduce manifest reload frequency
            manifestLoadingRetryDelay: 2000,
            manifestLoadingMaxRetry: 1,
            // Remove live sync constraints to allow free seeking
            // liveSyncDuration: 3,
            // liveMaxLatencyDuration: 10,
            // Reduce playlist reload frequency
            playlistLoadingMaxRetry: 1,
            playlistLoadingRetryDelay: 2000,
            // Additional settings to prevent automatic seeking to live edge
            startLevel: -1,
            capLevelToPlayerSize: false,
            maxMaxBufferLength: 60, // Larger buffer for better sync
            // Better seeking behavior for early positions - sync-friendly
            nudgeOffset: 0.1, // Larger nudge for better sync
            nudgeMaxRetry: 2, // Allow some retries for sync correction
            maxBufferHole: 2.0, // Moderate hole tolerance
            // Seek behavior optimized for A/V sync
            seekHoleNudgeDuration: 0.1, // Moderate nudge duration
            maxSeekHole: 2.0, // Moderate hole tolerance
            // Fragment retry settings
            fragLoadingTimeOut: 8000, // Longer timeout for reliable loading
            fragLoadingMaxRetry: 2,
            // Buffer watchdog - balanced for sync
            highBufferWatchdogPeriod: 2, // Less aggressive buffer checks
            lowBufferWatchdogPeriod: 0.5,
            // A/V sync specific settings
            maxAudioFramesDrift: 1, // Limit audio drift
            appendErrorMaxRetry: 3, // Allow retries for sync recovery
            // Prevent too aggressive adaptation that breaks sync
            abrEwmaFastLive: 5.0,
            abrEwmaSlowLive: 9.0
        });

        hls_context.loadSource(source_url);
        hls_context.attachMedia(video);
        document.body.style.backgroundColor = "black";

        // Prevent automatic seeking to live edge
        hls_context.on(Hls.Events.FRAG_LOADED, function (event, data) {
            // Don't auto-seek when user has manually positioned the video
            if (Math.abs(video.currentTime - data.frag.start) > 2) {
                console.log("Preventing auto-seek to live edge");
            }
        });

        // Prevent HLS from blocking seeks to early positions
        hls_context.on(Hls.Events.ERROR, function (event, data) {
            if (data.type === Hls.ErrorTypes.MEDIA_ERROR && data.details === Hls.ErrorDetails.BUFFER_SEEK_OVER_HOLE) {
                console.log("Buffer seek over hole detected, allowing seek anyway");
                // Don't prevent the seek, just log it
            }
        });

        // Monitor fragment loading to ensure early segments load
        hls_context.on(Hls.Events.FRAG_LOADING, function (event, data) {
            console.log(`Loading fragment: ${data.frag.sn} (${data.frag.start}s - ${data.frag.end}s)`);
        });

        // Monitor level switching to prevent issues with early seeks
        hls_context.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
            console.log(`Level switched to: ${data.level}`);
        });

        // Monitor buffering progress for early positions - gentle approach
        hls_context.on(Hls.Events.BUFFER_APPENDED, function (event, data) {
            if (data.timeRanges && data.timeRanges.start && data.timeRanges.start(0) < 10) {
                console.log(`Early buffer appended: ${data.timeRanges.start(0)}s - ${data.timeRanges.end(0)}s`);
                
                // Gentle play attempt that preserves A/V sync
                const video = document.getElementsByTagName("video")[0];
                if (video && video.paused && video.readyState >= 3) { // Require HAVE_FUTURE_DATA
                    console.log('Gentle play after early buffer append');
                    
                    // Single attempt with delay to preserve sync
                    setTimeout(() => {
                        video.play().then(() => {
                            console.log('✓ Gentle buffer append play successful');
                        }).catch(err => {
                            console.log('✗ Gentle buffer append play failed:', err);
                        });
                    }, 200); // Delay to let A/V sync settle
                }
            }
        });

        // Monitor when HLS encounters media errors that might affect sync
        hls_context.on(Hls.Events.ERROR, function (event, data) {
            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                if (data.details === Hls.ErrorDetails.BUFFER_APPEND_ERROR) {
                    console.log('Buffer append error - might affect A/V sync');
                } else if (data.details === Hls.ErrorDetails.BUFFER_SEEK_OVER_HOLE) {
                    console.log('Buffer seek over hole - preserving A/V sync');
                    // Don't intervene - let HLS handle it naturally
                }
            }
        });

        // Listen for stream end events
        hls_context.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log('Fatal network error, stream might have ended');
                        if (data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR || 
                            data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR) {
                            resetToInitialState();
                        }
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log('Fatal media error');
                        break;
                    default:
                        console.log('Fatal error');
                        break;
                }
            }
        });

        // Add seeking event handlers to manage HLS behavior during seeks
        video.addEventListener("seeking", () => {
            console.log("Video seeking started at", video.currentTime);
            // Show buffering indicator or similar feedback
        });

        video.addEventListener("seeked", () => {
            console.log("Video seeking completed at", video.currentTime);
            // Update active link when user manually seeks in timeline
            if (window.currentQuestions) {
                updateActiveLinkByTime(video.currentTime, window.currentQuestions);
            }
        });

        // Add buffering event handlers to provide feedback during seeking
        video.addEventListener("waiting", () => {
            console.log("Video is waiting for data (buffering)");
        });

        video.addEventListener("canplay", () => {
            console.log("Video can start playing");
        });

        video.addEventListener("canplaythrough", () => {
            console.log("Video can play through without stopping");
        });

        // Monitor buffer changes
        video.addEventListener("progress", () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const bufferedStart = video.buffered.start(0);
                console.log(`Buffer range: ${bufferedStart.toFixed(2)}s - ${bufferedEnd.toFixed(2)}s`);
            }
        });

        // Throttle manifest reloads during rapid seeking with more aggressive caching
        let manifestReloadThrottle = null;
        let lastManifestLoadTime = 0;
        
        hls_context.on(Hls.Events.MANIFEST_LOADING, function (event, data) {
            const now = Date.now();
            
            // If manifest was loaded less than 1.5 seconds ago, try to prevent the reload
            if (now - lastManifestLoadTime < 1500) {
                console.log("Preventing frequent manifest reload, last load was", now - lastManifestLoadTime, "ms ago");
                return;
            }
            
            if (manifestReloadThrottle) {
                clearTimeout(manifestReloadThrottle);
            }
            
            manifestReloadThrottle = setTimeout(() => {
                manifestReloadThrottle = null;
                lastManifestLoadTime = Date.now();
            }, 200);
        });

        // Track successful manifest loads
        hls_context.on(Hls.Events.MANIFEST_LOADED, function (event, data) {
            lastManifestLoadTime = Date.now();
            console.log("Manifest successfully loaded at", lastManifestLoadTime);
        });

        hls_context.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log('Fatal network error, stream might have ended');
                        if (data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR || 
                            data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR) {
                            resetToInitialState();
                        }
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log('Fatal media error');
                        break;
                    default:
                        console.log('Fatal error');
                        break;
                }
            }
        });

        video.addEventListener("ended", () => {
          console.log("Stream has Ended! (#EXT-X-ENDLIST)");
          resetToInitialState();
        });

        // Additional listener for when stream reaches end
        hls_context.on(Hls.Events.LEVEL_UPDATED, function (event, data) {
            if (data.details && data.details.endOfStream) {
                console.log("Stream end detected via level update");
                resetToInitialState();
            }
        });
      }

      function deleteAllTimestamps() {
        document.querySelectorAll(".Stamps a").forEach(a => a.remove());
      }

      function resetToInitialState() {
        console.log("Resetting to initial state");
        destroy_hls_context();
        const video = document.getElementsByTagName("video")[0];
        video.style.display = "none";
        video.src = "";
        document.getElementsByTagName("input")[0].value = "";
        document.body.style.backgroundColor = "white";
        deleteAllTimestamps();
        
        // Remove any timeupdate handlers
        if (timeupdateHandler) {
          video.removeEventListener("timeupdate", timeupdateHandler);
          timeupdateHandler = null;
        }
        
        // Reset state variables
        currentTimestamps = 0;
        timeStamps = [];
        num_of_videos = 0;
        search_value = "";
        is_searching = false;
        window.currentQuestions = null;
        
        // Enable search button
        document.getElementById("search_button").disabled = false;
        document.body.style.cursor = "auto";
      }


    let timeupdateHandler = null;

    function generatingTimestamps(questions) {
      const vid = document.getElementsByTagName("video")[0];
      let currentIndex = 1;

      // falls schon ein alter Handler existiert → entfernen
      if (timeupdateHandler) {
        vid.removeEventListener("timeupdate", timeupdateHandler);
      }

      // Store questions globally for active link detection
      window.currentQuestions = questions;

      // Generate the first timestamp immediately (index 0)
      if (questions.length > 0) {
        generateTimeStamp(questions[0]);
      }

      // neuen Handler definieren
      timeupdateHandler = () => {
        const time = vid.currentTime;
        
        // Generate new timestamps when needed
        if (currentIndex < questions.length && time > questions[currentIndex].startTimeInSec) {
          generateTimeStamp(questions[currentIndex]);
          currentIndex++;
        }
        
        // Update active link based on current time
        updateActiveLinkByTime(time, questions);
      };

      // neuen Handler anhängen
      vid.addEventListener("timeupdate", timeupdateHandler);
    }

    function updateActiveLinkByTime(currentTime, questions) {
      // Find which question/video is currently active based on time
      let activeQuestionIndex = 0;
      
      for (let i = questions.length - 1; i >= 0; i--) {
        if (currentTime >= questions[i].startTimeInSec) {
          activeQuestionIndex = i;
          break;
        }
      }
      
      const activeQuestion = questions[activeQuestionIndex];
      
      // Find and set the active link
      const links = document.querySelectorAll(".Stamps a");
      links.forEach(link => {
        if (link.innerText === activeQuestion.question) {
          setActiveLink(link);
        }
      });
    }

      function generateTimeStamp(question) {
        generateTimeStampsDOM(question.question, question.startTimeInSec)
      }

      function generateTimeStampsDOM(title, time){
        var wrapper = document.createElement("div");
        wrapper.className = title;
        var link = document.createElement("a");
        link.href = "#";
        link.innerText = title;
        
        // Only set as active if this is the first question (time = 0) or if no other link is active
        const existingActiveLinks = document.querySelectorAll(".Stamps a[id='active']");
        if (time === 0 || existingActiveLinks.length === 0) {
          link.id = "active";
        }
        
        link.onclick = (e)=>{
          e.preventDefault();
          console.log(`Title clicked: ${title} at time ${time}`);
          
          // Use simple seek for title clicks - more reliable
          simpleSeek(time);
          
          // Update active link immediately
          setActiveLink(e.target);
        }
        wrapper.appendChild(link);
        document.getElementsByClassName("Stamps")[0].appendChild(wrapper);
      }


      function Jumpto(value, e){
        e.preventDefault();
        const video = document.getElementsByTagName("video")[0];
        
        console.log(`Manual timeline seek to ${value}`);
        
        // For very early positions (< 10 seconds), use enhanced early seek
        if (value < 10) {
          console.log(`Early position detected (${value}s), using enhanced early seek`);
          return enhancedEarlySeek(value);
        }
        
        // For other positions, try intelligent seeking but with fallback
        const wasPaused = video.paused;
        video.pause();
        
        // Store original position in case we need to fall back
        const originalTime = video.currentTime;
        
        console.log(`Attempting seek from ${originalTime} to ${value}`);
        
        // Try the seek
        video.currentTime = value;
        
        // Set up a timeout to detect if seek fails
        const seekTimeout = setTimeout(() => {
          console.log(`Seek to ${value} timed out, falling back to simple behavior`);
          // If still not at target after 2 seconds, just accept where we are
          if (Math.abs(video.currentTime - value) > 2) {
            console.log(`Seek failed, current position: ${video.currentTime}`);
          }
        }, 2000);
        
        const handleSeeked = () => {
          video.removeEventListener('seeked', handleSeeked);
          clearTimeout(seekTimeout);
          
          console.log(`Manual seek completed to ${video.currentTime} (target was ${value})`);
          
          // Update active link based on actual current time
          if (window.currentQuestions) {
            updateActiveLinkByTime(video.currentTime, window.currentQuestions);
          }
          
          if (!wasPaused) {
            video.play();
          }
        };
        
        video.addEventListener('seeked', handleSeeked);
        
        return value;
      }

      // Enhanced early seek function for positions < 10 seconds - A/V sync friendly
      function enhancedEarlySeek(targetTime) {
        const video = document.getElementsByTagName("video")[0];
        console.log(`Enhanced early seek to ${targetTime} (A/V sync friendly)`);
        
        const wasPaused = video.paused;
        console.log(`Video was ${wasPaused ? 'paused' : 'playing'} before seek`);
        
        // Use less aggressive approach to maintain A/V sync
        if (hls_context && hls_context.media) {
          console.log('Using A/V sync friendly early position strategy');
          
          // Don't stop/start HLS loading - this breaks A/V sync
          // Instead, just seek and let HLS handle it naturally
          video.currentTime = targetTime;
          
          // Set up gentle monitoring that doesn't interfere with sync
          setupGentleVideoMonitoring(video, targetTime, wasPaused);
          
          // Update active link
          if (window.currentQuestions) {
            updateActiveLinkByTime(targetTime, window.currentQuestions);
          }
          
        } else {
          console.log('HLS context not available, using simple seek fallback');
          simpleSeek(targetTime);
        }
        
        return targetTime;
      }

      // Gentle video monitoring that preserves A/V sync
      function setupGentleVideoMonitoring(video, targetTime, shouldPlay) {
        console.log('Setting up gentle video monitoring for A/V sync preservation');
        
        let monitoringActive = true;
        let playAttempts = 0;
        const maxPlayAttempts = 3; // Reduced from 10
        
        const cleanup = () => {
          monitoringActive = false;
        };
        
        const gentlePlay = (reason) => {
          if (!shouldPlay || !monitoringActive || playAttempts >= maxPlayAttempts) return;
          
          playAttempts++;
          console.log(`Gentle play attempt ${playAttempts}/${maxPlayAttempts} (${reason})`);
          
          video.play().then(() => {
            console.log(`✓ Gentle play successful on attempt ${playAttempts} (${reason})`);
            cleanup();
          }).catch(err => {
            console.log(`✗ Gentle play attempt ${playAttempts} failed (${reason}):`, err);
          });
        };
        
        // Only use seeked event to trigger play - preserves sync
        const seekedHandler = () => {
          video.removeEventListener('seeked', seekedHandler);
          console.log('Seeked event - attempting gentle play');
          
          if (shouldPlay) {
            // Small delay to let A/V sync settle
            setTimeout(() => {
              gentlePlay('after seeked');
            }, 100);
          }
          
          cleanup();
        };
        
        video.addEventListener('seeked', seekedHandler);
        
        // Cleanup after 10 seconds
        setTimeout(() => {
          if (monitoringActive) {
            video.removeEventListener('seeked', seekedHandler);
            console.log('Gentle monitoring cleanup after 10s');
            cleanup();
          }
        }, 10000);
      }

      // Monitor playback for early positions to ensure continuous play
      function startEarlyPositionPlaybackMonitor(video) {
        if (video.currentTime >= 10) return; // Only for early positions
        
        console.log('Starting early position playback monitor');
        
        let stuckCount = 0;
        let lastTime = video.currentTime;
        
        const monitor = setInterval(() => {
          if (video.currentTime >= 10) {
            console.log('Early position monitor: reached 10s, stopping monitor');
            clearInterval(monitor);
            return;
          }
          
          if (video.paused) {
            console.log('Early position monitor: video is paused, stopping monitor');
            clearInterval(monitor);
            return;
          }
          
          // Check if playback is stuck
          if (Math.abs(video.currentTime - lastTime) < 0.1) {
            stuckCount++;
            console.log(`Early position monitor: playback seems stuck (${stuckCount}/3)`);
            
            if (stuckCount >= 3) {
              console.log('Early position monitor: forcing play due to stuck playback');
              video.play().then(() => {
                console.log('✓ Monitor forced play successful');
                stuckCount = 0;
              }).catch(err => {
                console.log('✗ Monitor forced play failed:', err);
                clearInterval(monitor);
              });
            }
          } else {
            stuckCount = 0; // Reset counter if playback is progressing
          }
          
          lastTime = video.currentTime;
        }, 1000); // Check every second
        
        // Stop monitoring after 30 seconds max
        setTimeout(() => {
          clearInterval(monitor);
          console.log('Early position monitor: stopped after 30s timeout');
        }, 30000);
      }

      // Simple seek function for title clicks - always works immediately
      function simpleSeek(targetTime) {
        const video = document.getElementsByTagName("video")[0];
        console.log(`Simple seek to ${targetTime}`);
        
        const wasPaused = video.paused;
        console.log(`Video was ${wasPaused ? 'paused' : 'playing'} before simple seek`);
        
        video.pause();
        video.currentTime = targetTime;
        
        const handleSeeked = () => {
          video.removeEventListener('seeked', handleSeeked);
          console.log(`Simple seek completed to ${video.currentTime}`);
          
          // Update active link based on the new time
          if (window.currentQuestions) {
            updateActiveLinkByTime(targetTime, window.currentQuestions);
          }
          
          // Resume playback if it was playing before
          if (!wasPaused) {
            console.log('Resuming playback after simple seek');
            video.play().then(() => {
              console.log('✓ Simple seek playback resumed successfully');
            }).catch(err => {
              console.log('✗ Simple seek playback resume failed:', err);
              // Try again after a brief delay
              setTimeout(() => {
                video.play().catch(err2 => {
                  console.log('✗ Delayed simple seek playback also failed:', err2);
                });
              }, 250);
            });
          }
        };
        
        video.addEventListener('seeked', handleSeeked);
        
        // Backup timeout in case seeked event doesn't fire
        setTimeout(() => {
          if (!wasPaused && video.paused) {
            console.log('Simple seek timeout - forcing play');
            video.play().catch(err => {
              console.log('✗ Timeout simple seek play failed:', err);
            });
          }
        }, 2000);
        
        return targetTime;
      }

      function setActiveLink(linkElem) {
        // alle bisherigen aktiven Links deaktivieren
        document.querySelectorAll(".Stamps a").forEach(a => a.id = "");
        // den geklickten aktiv setzen
        linkElem.id = "active";
      }


</script>
</body>
</html>
